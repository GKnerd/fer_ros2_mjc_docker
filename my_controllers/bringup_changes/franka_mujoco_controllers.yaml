controller_manager:
  ros__parameters:
    update_rate: 1000

joint_state_broadcaster:
  ros__parameters:
    type: joint_state_broadcaster/JointStateBroadcaster


effort_forward_controller:
  ros__parameters:
    type: effort_controllers/JointGroupEffortController
    joints:
      - fer_joint1
      - fer_joint2
      - fer_joint3
      - fer_joint4
      - fer_joint5
      - fer_joint6
      - fer_joint7


joint_effort_traj_controller:
  ros__parameters:
    type: joint_trajectory_controller/JointTrajectoryController
    joints:
      - fer_joint1
      - fer_joint2
      - fer_joint3
      - fer_joint4
      - fer_joint5
      - fer_joint6
      - fer_joint7
    command_interfaces:
      - effort
    state_interfaces:
      - position
      - velocity
    gains:
     fer_joint1: { p: 600., d: 30., i: 0., i_clamp: 1. }
     fer_joint2: { p: 600., d: 30., i: 0., i_clamp: 1. }
     fer_joint3: { p: 600., d: 30., i: 0., i_clamp: 1. }
     fer_joint4: { p: 600., d: 30., i: 0., i_clamp: 1. }
     fer_joint5: { p: 250., d: 10., i: 0., i_clamp: 1. }
     fer_joint6: { p: 150., d: 10., i: 0., i_clamp: 1. }
     fer_joint7: { p: 50., d: 5., i: 0., i_clamp: 1. }


joint_pos_traj_controller:
  ros__parameters:
    type: joint_trajectory_controller/JointTrajectoryController
    joints:
      - fer_joint1
      - fer_joint2
      - fer_joint3
      - fer_joint4
      - fer_joint5
      - fer_joint6
      - fer_joint7
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity


gripper_effort_controller:
  ros__parameters:
    type: effort_controllers/GripperActionController
    joint: fer_finger_joint1
    action_monitor_rate: 20.0

gripper_position_controller:
  ros__parameters:
    type: position_controllers/GripperActionController
    joint: fer_finger_joint1
    action_monitor_rate: 20.0
    goal_tolerance: 0.005


cartesian_compliance_controller:
  ros__parameters:
    end_effector_link: "fer_link8"
    robot_base_link: "base"
    ft_sensor_ref_link: "fer_link8"
    compliance_ref_link: "fer_link8"
    
    type: cartesian_compliance_controller/CartesianComplianceController
    joints:
      - fer_joint1
      - fer_joint2
      - fer_joint3
      - fer_joint4
      - fer_joint5
      - fer_joint6
      - fer_joint7

    command_interfaces:
      - position
      
    stiffness:  # w.r.t. compliance_ref_link
        trans_x: 500.0
        trans_y: 500.0
        trans_z: 500.0
        rot_x: 20.0
        rot_y: 20.0
        rot_z: 20.0

    solver:
        error_scale: 0.5
        iterations: 1

    pd_gains:
        trans_x: {p: 0.05, d: 0.005}
        trans_y: {p: 0.05, d: 0.005}
        trans_z: {p: 0.05, d: 0.005}
        rot_x: {p: 1.5}
        rot_y: {p: 1.5}
        rot_z: {p: 1.5}

motion_control_handle:
  ros__parameters:
    end_effector_link: "fer_hand_tcp"
    robot_base_link: "base"
    type: cartesian_controller_handles/MotionControlHandle
    joints:
      - fer_joint1
      - fer_joint2
      - fer_joint3
      - fer_joint4
      - fer_joint5
      - fer_joint6
      - fer_joint7
